<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem conexão</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            width: 100%;
            height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            background: #f5f7fb;

            font-family: Arial, Helvetica, sans-serif;
        }

        .container{
            width: 90%;
            max-width: 400px;

            background: #ffffff;

            padding: 40px 30px;

            border-radius: 20px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.08);

            text-align: center;
        }

        .icon{
            font-size: 70px;
            margin-bottom: 20px;
        }

        h1{
            color: #222;
            font-size: 28px;
            margin-bottom: 15px;
        }

        p{
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        button{
            border: none;

            background: #2563eb;
            color: white;

            padding: 14px 24px;

            border-radius: 12px;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{
            background: #1d4ed8;
        }

        button:active{
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="icon">
            📡
        </div>

        <h1>Sem conexão</h1>

        <p>
            Não foi possível acessar a internet.
            Verifique sua conexão e tente novamente.
        </p>

        <button onclick="location.reload()">
            Tentar novamente
        </button>

    </div>

</body>
</html>
